pre-commit:
  parallel: true
  commands:
    fmt-check:
      run: cargo fmt -- --check
    clippy:
      run: cargo clippy --all-targets --all-features -- -D warnings

pre-push:
  parallel: true
  commands:
    test:
      run: cargo test
    clippy:
      run: cargo clippy --all-targets --all-features -- -D warnings
