name: Code Factory PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  checks: read

jobs:
  review_agent:
    name: Review Agent
    uses: benchcutlogic/code-factory/.github/workflows/review-agent-gate.yml@main
    with:
      review_required: "true"
      head_sha: ${{ github.event.pull_request.head.sha }}
    secrets: inherit
