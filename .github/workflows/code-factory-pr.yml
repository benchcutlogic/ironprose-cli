name: Code Factory

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  checks: read

jobs:
  risk_policy_gate:
    name: risk-policy-gate
    uses: benchcutlogic/code-factory/.github/workflows/risk-policy-gate.yml@v1.0.0
    with:
      base_sha: ${{ github.event.pull_request.base.sha }}
      head_sha: ${{ github.event.pull_request.head.sha }}
    secrets: inherit

  ci_pipeline:
    name: CI Pipeline
    needs: risk_policy_gate
    uses: benchcutlogic/code-factory/.github/workflows/ci-pipeline.yml@v1.0.0
    secrets: inherit

  review_agent:
    name: Review Agent
    needs: risk_policy_gate
    uses: benchcutlogic/code-factory/.github/workflows/review-agent-gate.yml@v1.0.0
    with:
      review_required: ${{ needs.risk_policy_gate.outputs.review_required }}
      head_sha: ${{ github.event.pull_request.head.sha }}
    secrets: inherit
