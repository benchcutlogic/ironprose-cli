name: Code Factory

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  risk-policy-gate:
    uses: benchcutlogic/code-factory/.github/workflows/risk-policy-gate.yml@main
    with:
      base_sha: ${{ github.event.pull_request.base.sha }}
      head_sha: ${{ github.event.pull_request.head.sha }}
    secrets: inherit

  ci-pipeline:
    needs: risk-policy-gate
    uses: benchcutlogic/code-factory/.github/workflows/ci-pipeline.yml@main
    secrets: inherit

  browser-evidence:
    needs: risk-policy-gate
    uses: benchcutlogic/code-factory/.github/workflows/browser-evidence.yml@main
    with:
      browser_required: ${{ needs.risk-policy-gate.outputs.browser_required }}
    secrets: inherit

  review-agent:
    needs: risk-policy-gate
    uses: benchcutlogic/code-factory/.github/workflows/review-agent-gate.yml@main
    with:
      review_required: ${{ needs.risk-policy-gate.outputs.review_required }}
      head_sha: ${{ github.event.pull_request.head.sha }}
    secrets: inherit
