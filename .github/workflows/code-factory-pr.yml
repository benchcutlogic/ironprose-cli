name: Code Factory PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  resolve_outdated_comments:
    name: Resolve Outdated Comments
    uses: benchcutlogic/code-factory/.github/workflows/resolve-outdated-comments.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
    secrets:
      token: ${{ secrets.JPOEHNELT_BOT }}

  auto_merge:
    name: Auto Merge
    uses: benchcutlogic/code-factory/.github/workflows/auto-merge.yml@main
    secrets: inherit

