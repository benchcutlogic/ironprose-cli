name: Code Factory

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read
  checks: read

jobs:
  risk_policy_gate:
    name: risk-policy-gate
    uses: benchcutlogic/code-factory/.github/workflows/risk-policy-gate.yml@0b72401b65691444f7ac711bc7d895bfd36522ec
    with:
      base_sha: ${{ github.event.pull_request.base.sha }}
      head_sha: ${{ github.event.pull_request.head.sha }}
    secrets: inherit

  ci_pipeline:
    name: CI Pipeline
    needs: risk_policy_gate
    uses: benchcutlogic/code-factory/.github/workflows/ci-pipeline.yml@0b72401b65691444f7ac711bc7d895bfd36522ec
    secrets: inherit

  browser_evidence:
    name: Browser Evidence
    needs: risk_policy_gate
    uses: benchcutlogic/code-factory/.github/workflows/browser-evidence.yml@0b72401b65691444f7ac711bc7d895bfd36522ec
    with:
      browser_required: ${{ needs.risk_policy_gate.outputs.browser_required }}
    secrets: inherit

  review_agent:
    name: Review Agent
    needs: risk_policy_gate
    uses: benchcutlogic/code-factory/.github/workflows/review-agent-gate.yml@0b72401b65691444f7ac711bc7d895bfd36522ec
    with:
      review_required: ${{ needs.risk_policy_gate.outputs.review_required }}
      head_sha: ${{ github.event.pull_request.head.sha }}
    secrets: inherit
