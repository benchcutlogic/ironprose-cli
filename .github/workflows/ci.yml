name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}

      - name: Run tests
        run: cargo test --verbose

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: lint

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

  smoketest:
    name: Smoketest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: smoketest

      - name: Build release binary
        run: cargo build --release

      - name: ironprose --help
        run: ./target/release/ironprose --help

      - name: ironprose --version
        run: ./target/release/ironprose --version

      - name: ironprose schema (full spec)
        run: ./target/release/ironprose schema | head -5

      - name: ironprose schema analyze
        run: ./target/release/ironprose schema analyze | grep -q POST

      - name: ironprose schema unknown (should fail)
        run: |
          if ./target/release/ironprose schema nonexistent 2>err.txt; then
            echo "Expected failure but got success"; exit 1
          fi
          grep -q 'Unknown endpoint' err.txt

      - name: Reject path traversal
        run: |
          if ./target/release/ironprose analyze --file ../../etc/passwd 2>err.txt; then
            echo "Expected failure but got success"; exit 1
          fi
          grep -q traversal err.txt

      - name: Reject absolute path
        run: |
          if ./target/release/ironprose analyze --file /etc/passwd 2>err.txt; then
            echo "Expected failure but got success"; exit 1
          fi
          grep -q Absolute err.txt
